[HelpMyPurposeIs]
other = "Моя мета — допомогти тобі створювати опитування за методом мажоритарного голосування."

[HelpWhatIsMj]
other = "Що таке мажоритарне голосування?"

[HelpWhatIsMjAnswer]
other = "Досить крута **система голосування.** Вона використовується у французьких :flag_fr: винних 🍷 конкурсах. Вона проста, витончена та справедлива."

[HelpCanBotReadMessage]
other = "Чи може цей бот читати наші повідомлення?"

[HelpCanBotReadMessageAnswer]
other = "**Ні.** Заради додаткової приватності цьому сучасному боту НЕ дозволено читати повідомлення, він може лише реагувати на власну команду `/mj` та взаємодії з кнопками."

[HelpCanUseMoreThanFiveGrades]
other = "Чи можу я використовувати більше 5 оцінок?"

[HelpCanUseMoreThanFiveGradesAnswer]
other = "**Наразі ні.** Discord обмежує кількість кнопок у рядку дії до 5, тому нам знадобиться більше винахідливості, аби підтримувати більше оцінок."

[HelpCanUseMoreProposals]
other = "Чи можу я використати більше 5 пропозицій?"

[HelpCanUseMoreProposalsAnswer]
other = "**Так.** Discord наразі не підтримує варіативні команди в застосунку, але як обхідний шлях ви можете вказувати кілька пропозицій для одного поля, використовуючи символ `|` як роздільник."

[ExplainWhyMj]
other = "Чому мажоритарне голосування?"

[ExplainWhyMjSubtitle]
other = "Бо це настільки круто, що воно буквально какає веселками! :rainbow: :poop:"

[ExplainWhyMjParagraph]
other = "У звичайних _одномандатних опитуваннях_ ви повинні обрати одну — і тільки одну — пропозицію, і так само відхилити всі інші, навіть якщо ви, ймовірно, віддаєте перевагу одній над іншою серед тих, що були відхилені.\n\nЦя відсутність тонкощів має жахливі наслідки для якості опитування та демократії загалом, як-от широко зневажувана _двопартійна система_ в США та так само ненависне _корисне голосування_ у Франції.\n\nВ опитуваннях за методом _мажоритарного голосування_ ви можете висловити свою думку щодо кожної пропозиції.\n\nТепер ви нарешті можете сказати, що любите банани **і** полуницю більше, ніж шпинат! Чудово, чи не так?\n"

[ExplainHowMj]
other = "Як зрештою ранжуються пропозиції?"

[ExplainHowMjSubtitle]
other = "Звісно, магією! :magic_wand: _(жартую)_"

[ExplainHowMjParagraph]
other = "Пропозиції ранжуються за їхньою _медіанною оцінкою_, яку також називають _мажоритарною оцінкою_.\n\nМедіанна оцінка — це оцінка, що знаходиться рівно посередині; саме тому ми показуємо вертикальну лінію посередині профілів заслуг.\n"

[ExplainCheatMj]
other = "Чи можна хитрувати?"

[ExplainCheatMjSubtitle]
other = "Не те, щоб ми про це знали. :sauropod: :seedling:"

[ExplainCheatMjParagraph]
other = "Метод мажоритарного голосування був відкритий двома вченими _(Мішелем Балінскі та Рідою Ларакі)_ у 2003 році, і їхньою метою було саме знайти таку виборчу систему, яка була б _антистратегічною_.\n\nЯкщо ви вважаєте, що знайшли спосіб обійти або покращити цього бота, приєднуйтесь до нашого Discord.\n"

